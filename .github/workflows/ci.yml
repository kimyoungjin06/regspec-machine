name: ci

on:
  push:
    branches:
      - main
      - master
      - feat/**
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package + test extras
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[test]

      - name: Run test suite
        run: |
          python -m pytest -q

  build_smoke:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package + build deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[api,build]

      - name: Build desktop smoke bundle
        run: |
          regspec-build-desktop --project-root . --dist-dir build/ci_dist --work-dir build/ci_work --spec-dir build/ci_spec --manifest-json build/ci_manifest_${{ runner.os }}.json

      - name: Upload build manifest
        uses: actions/upload-artifact@v4
        with:
          name: regspec-desktop-build-manifest-${{ runner.os }}
          path: build/ci_manifest_${{ runner.os }}.json
