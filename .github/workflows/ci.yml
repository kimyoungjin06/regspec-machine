name: ci

on:
  push:
    branches:
      - main
      - master
      - feat/**
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package + test extras
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[test]

      - name: Run test suite
        run: |
          python -m pytest -q

  build_smoke:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package + build deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[api,build]

      - name: Build desktop smoke bundle
        run: |
          regspec-build-desktop \
            --project-root . \
            --dist-dir /tmp/regspec_ci_build/dist \
            --work-dir /tmp/regspec_ci_build/work \
            --spec-dir /tmp/regspec_ci_build/spec \
            --manifest-json /tmp/regspec_ci_build/manifest.json

      - name: Upload build manifest
        uses: actions/upload-artifact@v4
        with:
          name: regspec-desktop-build-manifest
          path: /tmp/regspec_ci_build/manifest.json
