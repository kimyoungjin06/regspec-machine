name: ci

on:
  push:
    branches:
      - main
      - master
      - feat/**
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package + test extras
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[test]

      - name: Run test suite
        run: |
          python -m pytest -q tests
